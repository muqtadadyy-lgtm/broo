<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإعلانات - نظام الأنشطة الطلابية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="static/css/styles.css">
    <style>
        .announcements-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .announcement-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .announcement-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }
        
        .announcement-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border-color);
        }
        
        .announcement-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-color);
            margin: 0;
        }
        
        .announcement-meta {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .announcement-type {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .announcement-date {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        
        .announcement-content {
            color: var(--text-color);
            line-height: 1.6;
            margin-bottom: 15px;
        }
        
        .announcement-media {
            margin-top: 15px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .media-item {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
        }
        
        .media-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }
        
        .media-item video {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }
        
        .media-overlay {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.8rem;
        }
        
        .back-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
            z-index: 1000;
        }
        
        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }
        
        .no-announcements {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            font-size: 1.2rem;
        }
        
        .no-announcements i {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }
        
        .loading i {
            font-size: 2rem;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="dashboard-body theme-blue-light">
    <button class="back-btn" onclick="window.location.href='index.html'">
        <i class="fas fa-arrow-right"></i>
        العودة
    </button>

    <div class="announcements-container">
        <h1 class="page-title">
            <i class="fas fa-bullhorn"></i>
            الإعلانات والنشاطات
        </h1>
        
        <div id="announcementsList" class="loading">
            <i class="fas fa-spinner fa-spin"></i>
            <p>جاري تحميل الإعلانات...</p>
        </div>
    </div>

    <script src="static/js/script.js"></script>
    <script>
        let announcements = [];
        
        async function loadAnnouncements() {
            try {
                const response = await fetch('/api/announcements');
                const data = await response.json();
                
                if (data.success) {
                    announcements = data.announcements;
                    displayAnnouncements();
                } else {
                    showNoAnnouncements();
                }
            } catch (error) {
                console.error('Error loading announcements:', error);
                showNoAnnouncements();
            }
        }
        
        function displayAnnouncements() {
            const container = document.getElementById('announcementsList');
            
            if (announcements.length === 0) {
                showNoAnnouncements();
                return;
            }
            
            container.innerHTML = announcements.map(announcement => `
                <div class="announcement-card">
                    <div class="announcement-header">
                        <h3 class="announcement-title">${announcement.title}</h3>
                        <div class="announcement-meta">
                            <span class="announcement-type">${getTypeLabel(announcement.type)}</span>
                            <span class="announcement-date">${formatDate(announcement.created_at)}</span>
                        </div>
                    </div>
                    <div class="announcement-content">
                        ${announcement.content}
                    </div>
                    ${announcement.media && announcement.media.length > 0 ? `
                        <div class="announcement-media">
                            ${announcement.media.map((item, index) => `
                                <div class="media-item">
                                    ${item.type === 'image' ? 
                                        `<img src="${item.url}" alt="${item.caption || 'صورة'}" onclick="openMediaModal('${item.url}', '${item.caption || 'صورة'}')">` :
                                        `<video src="${item.url}" controls onclick="openMediaModal('${item.url}', '${item.caption || 'فيديو'}')"></video>`
                                    }
                                    <div class="media-overlay">
                                        <i class="fas fa-${item.type === 'image' ? 'image' : 'video'}"></i>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }
        
        function showNoAnnouncements() {
            const container = document.getElementById('announcementsList');
            container.innerHTML = `
                <div class="no-announcements">
                    <i class="fas fa-bullhorn"></i>
                    <h3>لا توجد إعلانات حالياً</h3>
                    <p>سيتم عرض الإعلانات والنشاطات هنا عند نشرها من قبل الموظفين</p>
                </div>
            `;
        }
        
        function getTypeLabel(type) {
            const labels = {
                'general': 'عام',
                'urgent': 'عاجل',
                'contest': 'مسابقة',
                'event': 'فعالية',
                'activity': 'نشاط'
            };
            return labels[type] || 'عام';
        }
        
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('ar-SA', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        
        function openMediaModal(url, title) {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.style.display = 'flex';
            modal.innerHTML = `
                <div class="modal-content" style="max-width: 90vw; max-height: 90vh;">
                    <div class="modal-header">
                        <h2>${title}</h2>
                        <button class="close-btn" onclick="this.closest('.modal').remove()">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <div style="text-align: center; padding: 20px;">
                        ${url.includes('.mp4') || url.includes('.webm') ? 
                            `<video src="${url}" controls autoplay style="max-width: 100%; max-height: 70vh;"></video>` :
                            `<img src="${url}" style="max-width: 100%; max-height: 70vh; object-fit: contain;">`
                        }
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            
            // Close on background click
            modal.addEventListener('click', function(e) {
                if (e.target === modal) {
                    modal.remove();
                }
            });
        }
        
        // Load announcements on page load
        window.addEventListener('DOMContentLoaded', loadAnnouncements);
    </script>
</body>
</html>
