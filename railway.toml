[build]
builder = "dockerfile"
# Force redeploy to pick up latest Dockerfile PORT fixes

[deploy]
# Railway handles restarts automatically

[variables]
PYTHON_VERSION = "3.11.9"
DEBUG = "False"
DB_ENGINE = "sqlite"

[[services]]
name = "university-activities"
type = "web"

[services.health_check]
path = "/health"
grace_period_seconds = 600
restart_policy_type = "never"
restart_policy_max_retries = 0

[services.build]
nixpacks_plan = "nixpacks.toml"
memory = "1536Mi"

[services.start_command]
command = "gunicorn --workers 1 --worker-class sync --timeout 900 --keep-alive 5 --max-requests 500 --max-requests-jitter 25 --bind 0.0.0.0:$PORT --access-logfile - --error-logfile - --log-level debug university_activities.wsgi:application"
