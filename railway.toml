[build]
builder = "nixpacks"

[deploy]
startCommand = "cd backend && gunicorn --workers 1 --worker-class sync --timeout 300 --bind 0.0.0.0:$PORT --graceful-timeout 120 --max-requests 500 --max-requests-jitter 50 --preload university_activities.wsgi:application"
healthcheckPath = "/health/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

[variables]
PYTHON_VERSION = "3.11.9"
DEBUG = "False"
DB_ENGINE = "postgres"

[[services]]
name = "university-activities"

[services.variables]
ALLOWED_HOSTS = ".onrender.com,.up.railway.app,university-activities-production.up.railway.app"
