[build]
builder = "dockerfile"
# Force redeploy to pick up latest Dockerfile PORT fixes

[deploy]
restartPolicyType = "always"
restartPolicyMaxRetries = 10

[variables]
PYTHON_VERSION = "3.11.9"
DEBUG = "False"
DB_ENGINE = "sqlite"

[[services]]
name = "university-activities"
type = "web"

[services.variables]
ALLOWED_HOSTS = ".onrender.com,.up.railway.app,university-activities-production.up.railway.app"
