[build]
builder = "dockerfile"
# Force redeploy to pick up latest Dockerfile PORT fixes

[watch]
# Trigger redeploy when these paths change
paths = [
    "backend/core/views.py",
    "backend/core/models.py",
    "backend/core/urls.py",
    "backend/university_activities/settings.py",
    "static/js/*.js",
    "templates/*.html",
    "Dockerfile",
    "railway.toml"
]

[deploy]
# Railway handles restarts automatically

[variables]
PYTHON_VERSION = "3.11.9"
DEBUG = "False"
DB_ENGINE = "sqlite"

[[services]]
name = "university-activities"
type = "web"

[services.health_check]
path = "/api/health"
grace_period_seconds = 300
restart_policy_type = "on_failure"
restart_policy_max_retries = 5

[services.build]
memory = "512Mi"

# RAILWAY PLATFORM BUG - Override cached Dockerfile with explicit start command
# Railway is using cached Dockerfile from weeks ago and ignoring all changes
[services.start_command]
command = "echo '=== RAILWAY OVERRIDE V26.0 ===' && echo '=== FORCING LATEST CODE ===' && echo '=== PWD: '$(pwd)' ===' && cd /app/backend && echo '=== CHANGED DIR ===' && python manage.py runserver 0.0.0.0:$PORT"
