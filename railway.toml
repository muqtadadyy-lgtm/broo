[build]
builder = "dockerfile"
# Force redeploy to pick up latest Dockerfile PORT fixes

[deploy]
# Railway handles restarts automatically

[variables]
PYTHON_VERSION = "3.11.9"
DEBUG = "False"
DB_ENGINE = "sqlite"

[[services]]
name = "university-activities"
type = "web"

[services.health_check]
path = "/health"
grace_period_seconds = 120
restart_policy_type = "on_failure"
restart_policy_max_retries = 5

[services.build]
nixpacks_plan = "nixpacks.toml"
memory = "512Mi"

[services.start_command]
command = "gunicorn --workers 1 --worker-class sync --timeout 600 --keep-alive 2 --max-requests 1000 --max-requests-jitter 50 --bind 0.0.0.0:$PORT --access-logfile - --error-logfile - --log-level debug university_activities.wsgi:application"

[services.build]
nixpacks_plan = "nixpacks.toml"
