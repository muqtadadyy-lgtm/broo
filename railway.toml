[build]
builder = "dockerfile"

[deploy]
restartPolicyType = "always"
restartPolicyMaxRetries = 10

[variables]
PYTHON_VERSION = "3.11.9"
DEBUG = "False"
DB_ENGINE = "sqlite"
PORT = "8080"

[[services]]
name = "university-activities"

[services.variables]
ALLOWED_HOSTS = ".onrender.com,.up.railway.app,university-activities-production.up.railway.app"
