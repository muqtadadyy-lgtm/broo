services:
  - type: web
    name: university-activities
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn --workers 2 --worker-class sync --timeout 180 --bind 0.0.0.0:$PORT --graceful-timeout 60 --max-requests 1000 --max-requests-jitter 100 university_activities.wsgi:application
    healthCheck:
      path: /health/
      initialDelaySeconds: 60
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 5
    autoDeploy: false
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DEBUG
        value: "False"
      - key: DB_ENGINE
        value: postgres
      - key: DB_NAME
        fromDatabase:
          name: university-activities-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: university-activities-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: university-activities-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: university-activities-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: university-activities-db
          property: port
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com
databases:
  - name: university-activities-db
    plan: free
    databaseName: university_activities
    user: university_activities
