services:
  - type: web
    name: university-activities
    runtime: python
    plan: starter
    rootDir: .
    buildCommand: cd backend && pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: cd backend && gunicorn --workers 1 --worker-class sync --timeout 300 --bind 0.0.0.0:$PORT --graceful-timeout 120 --max-requests 500 --max-requests-jitter 50 --preload university_activities.wsgi:application
    healthCheck:
      path: /health/
      initialDelaySeconds: 180
      periodSeconds: 120
      timeoutSeconds: 30
      failureThreshold: 10
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DEBUG
        value: "False"
      - key: DB_ENGINE
        value: postgres
      - key: DB_NAME
        fromDatabase:
          name: university-activities-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: university-activities-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: university-activities-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: university-activities-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: university-activities-db
          property: port
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com,.up.railway.app,university-activities-production.up.railway.app
databases:
  - name: university-activities-db
    plan: starter
    databaseName: university_activities
    user: university_activities
