[phases.setup]
nixPkgs = ["python311"]

[phases.build]
cmds = [
  "cd backend",
  "python -m pip install -r requirements.txt",
  "python manage.py migrate --fake-initial",
  "python manage.py collectstatic --noinput",
  "python manage.py seed_super_employee"
]

[start]
cmd = "cd backend && gunicorn --workers 1 --worker-class sync --timeout 300 --bind 0.0.0.0:$PORT --graceful-timeout 120 --max-requests 500 --max-requests-jitter 50 --preload university_activities.wsgi:application"
