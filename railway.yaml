services:
  - name: university-activities
    root: backend
    build:
      builder: NIXPACKS
      buildCommand: chmod +x build.sh && ./build.sh
    deploy:
      startCommand: gunicorn university_activities.wsgi:application --bind 0.0.0.0:$PORT
      healthcheckPath: /api/health
      restartPolicy:
        type: ON_FAILURE
        maxRetries: 10
    env:
      - name: PYTHON_VERSION
        value: "3.11"
      - name: DEBUG
        value: "False"
      - name: DJANGO_SECRET_KEY
        generate: true
      - name: JWT_SECRET_KEY
        generate: true
      - name: DB_ENGINE
        value: "postgres"
